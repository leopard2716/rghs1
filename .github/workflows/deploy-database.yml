name: Deploy Database

on:
  push:
    branches:
      - deploy/dev
      - deploy/prod
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-database.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-database-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-dev:
    if: github.ref_name == 'deploy/dev'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.DEV_SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ vars.DEV_SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link development database
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Preview development migrations
        run: supabase db push --dry-run

      - name: Apply development migrations
        run: supabase db push

  deploy-prod:
    if: github.ref_name == 'deploy/prod'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PROD_SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ vars.PROD_SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production database
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Preview production migrations
        run: supabase db push --dry-run

      - name: Apply production migrations
        run: supabase db push
